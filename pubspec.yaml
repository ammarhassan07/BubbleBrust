name: bubble_burst
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.5
  get: ^4.7.3
  get_storage_pro: ^0.1.9
  google_mobile_ads: ^9.0.0
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  flutter_local_notifications: ^22.0.1
  url_launcher: ^6.3.2
  http: ^1.6.0
  path_provider: ^2.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  audioplayers: ^6.0.0 # Adds high-performance audio playback
  flutter_launcher_icons: ^0.14.4
  shared_preferences: ^2.3.5  # Add this line here

# THE CORRECT PLACEMENT FOR LAUNCHER ICONS CONFIGURATION:
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/audio/ # Register your new audio folder