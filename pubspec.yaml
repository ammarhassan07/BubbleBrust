name: bubble_burst
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  audioplayers: ^6.0.0 # Adds high-performance audio playback
  flutter_launcher_icons: ^0.14.4
  shared_preferences: ^2.3.5  # Add this line here

# THE CORRECT PLACEMENT FOR LAUNCHER ICONS CONFIGURATION:
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/audio/ # Register your new audio folder